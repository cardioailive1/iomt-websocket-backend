apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardioai-nginx
  namespace: cardioai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cardioai-nginx
  template:
    metadata:
      labels:
        app: cardioai-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: frontend
          mountPath: /usr/share/nginx/html
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: frontend
        configMap:
          name: frontend-files
---
apiVersion: v1
kind: Service
metadata:
  name: cardioai-nginx
  namespace: cardioai
spec:
  selector:
    app: cardioai-nginx
  ports:
  - name: http
    port: 80
  - name: https
    port: 443
  type: LoadBalancer
