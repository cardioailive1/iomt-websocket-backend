# IMPORTANT: Do NOT commit real secrets here.
# Populate via Vault operator or:
#   kubectl create secret generic cardioai-secrets \
#     --namespace=cardioai \
#     --from-literal=shared_secret="$(vault kv get -field=shared_secret secret/cardioai)" \
#     --from-literal=jwt_secret="$(vault kv get -field=jwt_secret secret/cardioai)"
apiVersion: v1
kind: Secret
metadata:
  name: cardioai-secrets
  namespace: cardioai
type: Opaque
stringData:
  shared_secret: "REPLACE_VIA_VAULT"
  jwt_secret:    "REPLACE_VIA_VAULT"
