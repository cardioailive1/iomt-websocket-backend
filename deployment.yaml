apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardioai-backend
  namespace: cardioai
  labels:
    app: cardioai-backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cardioai-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cardioai-backend
    spec:
      serviceAccountName: cardioai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: cardioai-backend
        image: cardioai-backend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - name: websocket
          containerPort: 8765
        - name: health
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: cardioai-config
        env:
        - name: IOMT_SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: cardioai-secrets
              key: shared_secret
        - name: IOMT_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cardioai-secrets
              key: jwt_secret
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: cardioai-backend
