<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoMT CardioAI — Test Results</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07090d;
  --surface: #0b0f14;
  --panel: #0f141a;
  --card: #131920;
  --border: #1c2530;
  --border2: #243040;
  --pass: #22d688;
  --fail: #f04060;
  --warn: #f0a020;
  --accent: #38b8f8;
  --text: #b8ccd8;
  --muted: #465a6a;
  --dim: #2a3a4a;
  --pass-bg: rgba(34,214,136,0.06);
  --fail-bg: rgba(240,64,96,0.07);
}

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  overflow: hidden;
}

/* ─── HEADER ─── */
.header {
  padding: 20px 28px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.title-block h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.02em;
}

.title-block h1 em { color: var(--pass); font-style: normal; }

.title-block .subtitle {
  margin-top: 3px;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.stats-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.stat {
  text-align: center;
  padding: 8px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}

.stat .n {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1;
}

.stat .l {
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

.stat.s-pass { border-color: rgba(34,214,136,0.25); }
.stat.s-pass .n { color: var(--pass); }
.stat.s-fail { border-color: rgba(240,64,96,0.25); }
.stat.s-fail .n { color: var(--fail); }
.stat.s-info .n { color: var(--accent); }

/* ─── PROGRESS BAR ─── */
.prog-wrap {
  padding: 14px 28px 0;
  display: flex;
  align-items: center;
  gap: 14px;
}

.prog-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pass), var(--accent));
  border-radius: 2px;
  transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 10px rgba(34,214,136,0.4);
}

.prog-label {
  font-size: 0.62rem;
  color: var(--muted);
  white-space: nowrap;
}

/* ─── MAIN LAYOUT ─── */
.body-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  overflow: hidden;
  border-top: 1px solid var(--border);
  margin-top: 14px;
}

/* ─── SIDEBAR ─── */
.sidebar {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 10px 0;
  background: var(--surface);
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--dim); }

.sb-label {
  padding: 10px 14px 5px;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

.sb-item {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.12s;
}

.sb-item:hover { background: rgba(255,255,255,0.025); }

.sb-item.active {
  background: var(--pass-bg);
  border-left-color: var(--pass);
}

.sb-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--pass);
  box-shadow: 0 0 5px var(--pass);
}

.sb-dot.has-fail { background: var(--fail); box-shadow: 0 0 5px var(--fail); }

.sb-name {
  font-size: 0.66rem;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sb-count {
  font-size: 0.58rem;
  padding: 1px 6px;
  border-radius: 99px;
  background: rgba(34,214,136,0.1);
  color: var(--pass);
  flex-shrink: 0;
}

.sb-count.has-fail {
  background: rgba(240,64,96,0.1);
  color: var(--fail);
}

/* ─── MAIN PANEL ─── */
.main {
  overflow-y: auto;
  background: var(--panel);
}

.main::-webkit-scrollbar { width: 3px; }
.main::-webkit-scrollbar-thumb { background: var(--dim); }

.main-inner {
  padding: 18px 22px;
}

/* filter chips */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  align-items: center;
}

.filter-chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
  text-transform: uppercase;
}

.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.on { background: var(--pass-bg); border-color: var(--pass); color: var(--pass); }
.filter-chip.on-fail { background: var(--fail-bg); border-color: var(--fail); color: var(--fail); }

.search-box {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 4px 10px;
  color: var(--text);
  width: 180px;
  outline: none;
  transition: border-color 0.12s;
}

.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--dim); }

/* suite section header */
.suite-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.suite-hdr h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
}

.suite-hdr .s-meta {
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 1px;
}

/* test rows */
.test-list { }

.t-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: 3px;
  margin-bottom: 2px;
  border: 1px solid transparent;
  animation: fadeSlide 0.2s ease both;
}

.t-row:hover { background: rgba(255,255,255,0.02); border-color: var(--border); }
.t-row.failed { background: var(--fail-bg); border-color: rgba(240,64,96,0.15); }

@keyframes fadeSlide {
  from { opacity:0; transform: translateX(-4px); }
  to   { opacity:1; transform: translateX(0); }
}

.t-status {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  width: 40px;
  flex-shrink: 0;
}

.t-status.pass { color: var(--pass); }
.t-status.fail { color: var(--fail); }

.t-name {
  font-size: 0.68rem;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.t-param {
  color: var(--accent);
  opacity: 0.65;
  font-size: 0.62rem;
}

.t-pct {
  font-size: 0.58rem;
  color: var(--dim);
  width: 32px;
  text-align: right;
  flex-shrink: 0;
}

/* parametrized sub-rows */
.param-rows {
  margin: 1px 0 3px 44px;
  border-left: 1px solid var(--border2);
  padding-left: 10px;
}

.p-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 6px;
  border-radius: 2px;
  animation: fadeSlide 0.15s ease both;
}

.p-row:hover { background: rgba(255,255,255,0.02); }

.p-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--pass);
  flex-shrink: 0;
}

.p-name {
  font-size: 0.62rem;
  color: var(--muted);
}

.p-name .param-val { color: var(--accent); opacity: 0.75; }

/* empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 0;
  gap: 10px;
  color: var(--dim);
  font-size: 0.7rem;
}

/* ─── FOOTER ─── */
.footer {
  border-top: 1px solid var(--border);
  padding: 6px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: var(--surface);
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.footer-item { display: flex; align-items: center; gap: 5px; }
.footer-dot { width: 5px; height: 5px; border-radius: 50%; }
.footer-dot.p { background: var(--pass); }
.footer-dot.f { background: var(--fail); }
.footer-dot.w { background: var(--warn); }

.footer-right {
  margin-left: auto;
  background: rgba(34,214,136,0.08);
  border: 1px solid rgba(34,214,136,0.15);
  color: var(--pass);
  padding: 2px 10px;
  border-radius: 99px;
  font-size: 0.57rem;
}
</style>
</head>

let activeSuite = SUITES[0].id;
let filter = 'all'; // all | pass | fail
let query = '';

function fmt(name) {
  // strip parametrize brackets for base name display
  const base = name.replace(/\[.*\]$/, '');
  const param = name.match(/\[(.+)\]$/);
  return { base, param: param ? param[1] : null };
}

function humanize(s) {
  return s.replace(/^test_/, '').replace(/_/g, ' ');
}

// Build sidebar
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sb-label">Test Suites</div>';

  for (const suite of SUITES) {
    const total = suite.passed + suite.failed;
    const hasFail = suite.failed > 0;
    const btn = document.createElement('button');
    btn.className = 'sb-item' + (suite.id === activeSuite ? ' active' : '');
    btn.dataset.sid = suite.id;
    btn.innerHTML = `
      <div class="sb-dot${hasFail ? ' has-fail' : ''}"></div>
      <span class="sb-name">${suite.label}</span>
      <span class="sb-count${hasFail ? ' has-fail' : ''}">${total}</span>`;
    btn.addEventListener('click', () => {
      activeSuite = suite.id;
      document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMain();
    });
    sb.appendChild(btn);
  }
}

// Render main panel
function renderMain() {
  const suite = SUITES.find(s => s.id === activeSuite);
  if (!suite) return;

  const inner = document.getElementById('mainInner');
  inner.innerHTML = '';

  // suite header
  const hdr = document.createElement('div');
  hdr.className = 'suite-hdr';
  hdr.innerHTML = `<h2>${suite.label}</h2><span class="s-meta">${suite.tests.length} tests &nbsp;·&nbsp; ${suite.passed} passed · ${suite.failed} failed</span>`;
  inner.appendChild(hdr);

  // filter bar
  const filters = document.createElement('div');
  filters.className = 'filters';
  const fOpts = [{k:'all',l:'All'},{k:'pass',l:'Passed'},{k:'fail',l:'Failed'}];
  for (const f of fOpts) {
    const ch = document.createElement('button');
    ch.className = 'filter-chip' + (filter === f.k ? (f.k === 'fail' ? ' on-fail' : ' on') : '');
    ch.textContent = f.l;
    ch.addEventListener('click', () => { filter = f.k; renderMain(); });
    filters.appendChild(ch);
  }
  const srch = document.createElement('input');
  srch.type = 'text';
  srch.className = 'search-box';
  srch.placeholder = 'search tests…';
  srch.value = query;
  srch.addEventListener('input', e => { query = e.target.value; renderMain(); });
  filters.appendChild(srch);
  inner.appendChild(filters);

  // group tests by base name (collapse parametrized)
  const groups = [];
  const seen = new Map();

  for (const t of suite.tests) {
    const { base, param } = fmt(t.name);
    if (param !== null) {
      if (!seen.has(base)) {
        const g = { base, isParam: true, status: t.status, items: [] };
        seen.set(base, g);
        groups.push(g);
      }
      seen.get(base).items.push({ param, status: t.status, pct: t.pct });
      if (t.status === 'FAILED') seen.get(base).status = 'FAILED';
    } else {
      groups.push({ base, isParam: false, status: t.status, pct: t.pct, items: [] });
    }
  }

  // apply filter and search
  const filtered = groups.filter(g => {
    if (filter === 'pass' && g.status === 'FAILED') return false;
    if (filter === 'fail' && g.status === 'PASSED') return false;
    if (query) {
      const q = query.toLowerCase();
      return g.base.includes(q) || humanize(g.base).includes(q) ||
             g.items.some(i => i.param.toLowerCase().includes(q));
    }
    return true;
  });

  if (filtered.length === 0) {
    inner.insertAdjacentHTML('beforeend', `<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>No tests match</span></div>`);
    return;
  }

  const list = document.createElement('div');
  list.className = 'test-list';

  let delay = 0;
  for (const g of filtered) {
    const isPassed = g.status === 'PASSED';
    const statusClass = isPassed ? 'pass' : 'fail';
    const statusLabel = isPassed ? 'PASS' : 'FAIL';

    if (!g.isParam) {
      const row = document.createElement('div');
      row.className = `t-row ${isPassed ? '' : 'failed'}`;
      row.style.animationDelay = delay + 'ms';
      row.innerHTML = `
        <span class="t-status ${statusClass}">${statusLabel}</span>
        <span class="t-name">${humanize(g.base)}</span>
        <span class="t-pct">${g.pct}%</span>`;
      list.appendChild(row);
      delay += 15;
    } else {
      // parametrized group
      const row = document.createElement('div');
      row.className = `t-row ${isPassed ? '' : 'failed'}`;
      row.style.animationDelay = delay + 'ms';
      row.innerHTML = `
        <span class="t-status ${statusClass}">${statusLabel}</span>
        <span class="t-name">${humanize(g.base)} <span class="t-param">×${g.items.length}</span></span>
        <span class="t-pct"></span>`;
      list.appendChild(row);
      delay += 15;

      // sub-rows
      const sub = document.createElement('div');
      sub.className = 'param-rows';
      for (let i = 0; i < g.items.length; i++) {
        const item = g.items[i];
        const show = filter === 'fail' ? item.status === 'FAILED' : filter === 'pass' ? item.status === 'PASSED' : true;
        if (!show) continue;
        const pr = document.createElement('div');
        pr.className = 'p-row';
        pr.style.animationDelay = (delay + i * 12) + 'ms';
        const pStatus = item.status === 'PASSED' ? 'pass' : 'fail';
        pr.innerHTML = `
          <div class="p-dot" style="background:var(--${pStatus});box-shadow:0 0 4px var(--${pStatus})"></div>
          <span class="p-name"><span class="param-val">${item.param}</span></span>
          <span style="margin-left:auto;font-size:0.55rem;color:var(--dim)">${item.pct}%</span>`;
        sub.appendChild(pr);
      }
      list.appendChild(sub);
      delay += g.items.length * 12;
    }
  }

  inner.appendChild(list);
}

buildSidebar();
renderMain();

// animate progress
setTimeout(() => {
  document.getElementById('pFill').style.width = '100%';
  document.getElementById('pLabel').textContent = '200 / 200 — 100%';
}, 120);
</script>
</body>
</html>
