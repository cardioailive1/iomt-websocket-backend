# Lightweight nginx config for serving the frontend static files only.
# Used when the frontend is deployed separately from the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index iomt_cardioai_dashboard.html;

    # Cache static assets for 1 day
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://cardioai-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
